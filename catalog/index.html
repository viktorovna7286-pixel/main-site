<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>8848 ВЕРШИНА | Полный каталог 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,500;0,700;1,600&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #1a1a1a;
            --color-bg-soft: #212121;
            --color-accent: #C9A84C;
            --color-accent-light: #e8c96b;
            --color-text: #ffffff;
        }
        html { scroll-padding-top: 5.75rem; }
        @media (max-width: 767px) {
            html { scroll-padding-top: clamp(4.5rem, 16vw + 2rem, 6rem); }
        }
        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
        }
        body.mobile-nav-overflow-lock {
            overflow: hidden;
            touch-action: none;
        }

        .mobile-nav-panel-scroll {
            max-height: min(72vh, calc(100dvh - 5.5rem));
            max-height: min(72vh, calc(100svh - 5.5rem));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: max(1rem, env(safe-area-inset-bottom, 0px));
        }
        .font-numbers { font-family: 'Montserrat', sans-serif; font-weight: 500; }
        .font-numbers-bold { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .font-title { font-family: 'Raleway', sans-serif; font-weight: 700; }
        .font-main { font-family: 'Raleway', sans-serif; font-weight: 500; }
        .font-description { font-family: 'Raleway', sans-serif; font-weight: 600; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gold-bg { background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-light) 100%); }
        .premium-card { background: #1a1a1a; border: 1px solid #2a2a2a; }
        .catalog-card-hit {
            transition: border-color 0.45s ease, box-shadow 0.45s ease, transform 0.15s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.38), 0 8px 10px -6px rgba(0, 0, 0, 0.22);
        }
        .catalog-card-hit.premium-card {
            background: #1a1a1a !important;
            border-color: #2a2a2a !important;
        }
        .catalog-card-hit .border-t.border-white\/5 {
            border-top-color: #2a2a2a !important;
        }
        .catalog-card-hit:hover {
            border-color: rgba(201, 168, 76, 0.42) !important;
            box-shadow:
                0 22px 44px rgba(0, 0, 0, 0.42),
                0 0 32px rgba(201, 168, 76, 0.2),
                inset 0 0 0 1px rgba(201, 168, 76, 0.12);
        }
        .catalog-photo-badges {
            position: absolute;
            z-index: 2;
            top: 0.35rem;
            left: 0.35rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.28rem;
            pointer-events: none;
        }
        @media (min-width: 640px) {
            .catalog-photo-badges {
                top: 0.45rem;
                left: 0.45rem;
                gap: 0.34rem;
            }
        }

        .catalog-chip {
            display: inline-block;
            padding: 0.34rem 0.72rem;
            border-radius: 9999px;
            font-size: clamp(8px, 2.1vw, 10px);
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(160, 160, 160, 0.35);
            color: rgba(235, 235, 235, 0.95);
            line-height: 1.25;
            white-space: nowrap;
        }
        /* Линейка ценового сегмента */
        .catalog-chip--seg-budget {
            border-color: rgba(120, 190, 200, 0.6);
            color: #b8eaf0;
            background: rgba(18, 40, 48, 0.82);
        }
        .catalog-chip--seg-comfort {
            border-color: rgba(120, 200, 155, 0.58);
            color: #bff0d4;
            background: rgba(22, 48, 36, 0.82);
        }
        .catalog-chip--seg-premium {
            border-color: rgba(200, 165, 230, 0.55);
            color: #ebd4ff;
            background: rgba(48, 32, 58, 0.82);
        }
        .catalog-chip--seg-fallback {
            border-color: rgba(201, 168, 76, 0.45);
            color: rgba(232, 201, 107, 0.95);
            background: rgba(35, 28, 12, 0.78);
        }
        /* Тип компрессора / режима */
        .catalog-chip--type-onoff {
            border-color: rgba(205, 180, 135, 0.55);
            color: #ebe0cc;
            background: rgba(48, 38, 24, 0.82);
        }
        .catalog-chip--type-inverter {
            border-color: rgba(115, 185, 255, 0.55);
            color: #c8e4ff;
            background: rgba(24, 36, 58, 0.82);
        }
        .catalog-chip--type-fallback {
            border-color: rgba(180, 175, 170, 0.45);
            color: rgba(220, 216, 210, 0.95);
            background: rgba(40, 40, 42, 0.78);
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .calc-result-panel {
            overflow: hidden;
            opacity: 0;
            transform: translateY(14px);
            max-height: 0;
            margin-top: 0;
            transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.45s ease, margin-top 0.35s ease;
        }
        .calc-result-panel.calc-result-panel--visible {
            opacity: 1;
            transform: translateY(0);
            max-height: 2200px;
            margin-top: 1.75rem;
        }

        /* Как на главной: контур + стекло + двойное свечение в цвет контура */
        .btn-shared {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition:
                background-color 0.3s ease,
                color 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.35s ease,
                transform 0.2s ease;
        }
        .gold-outline-btn {
            border: 2px solid var(--color-accent);
            color: var(--color-accent);
            background: rgba(201, 168, 76, 0.1);
            box-shadow:
                0 0 14px rgba(201, 168, 76, 0.32),
                0 0 36px rgba(201, 168, 76, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        .gold-outline-btn:hover {
            background: rgba(201, 168, 76, 0.22);
            color: #ffe6a6;
            border-color: var(--color-accent-light);
            box-shadow:
                0 0 28px rgba(201, 168, 76, 0.55),
                0 0 52px rgba(201, 168, 76, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
        .gold-outline-btn:focus-visible {
            outline: none;
            box-shadow:
                0 0 0 2px rgba(232, 201, 107, 0.55),
                0 0 30px rgba(201, 168, 76, 0.45);
        }
        .white-outline-btn {
            border: 2px solid rgba(255, 255, 255, 0.94);
            color: rgba(255, 255, 255, 0.98);
            background: rgba(255, 255, 255, 0.06);
            box-shadow:
                0 0 16px rgba(255, 255, 255, 0.18),
                0 0 40px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .white-outline-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border-color: #fff;
            box-shadow:
                0 0 26px rgba(255, 255, 255, 0.42),
                0 0 48px rgba(255, 255, 255, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }
        .white-outline-btn:focus-visible {
            outline: none;
            box-shadow:
                0 0 0 2px rgba(255, 255, 255, 0.55),
                0 0 28px rgba(255, 255, 255, 0.35);
        }
        .btn-shared-selected {
            border-radius: 9999px;
            border: 2px solid var(--color-accent);
            background: rgba(201, 168, 76, 0.24);
            color: #ffe6a6;
            box-shadow:
                0 0 18px rgba(201, 168, 76, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: box-shadow 0.3s ease, background 0.3s ease;
        }
        .btn-shared-solid {
            border-radius: 9999px;
            border: 2px solid var(--color-accent);
            background: var(--color-accent);
            color: #1a1a1a;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow:
                0 0 20px rgba(201, 168, 76, 0.4),
                0 0 44px rgba(201, 168, 76, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.35s ease, transform 0.18s ease;
        }
        .btn-shared-solid:hover {
            background: var(--color-accent-light);
            border-color: var(--color-accent-light);
            box-shadow:
                0 0 34px rgba(232, 201, 107, 0.55),
                0 0 56px rgba(201, 168, 76, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }
        .btn-shared-solid:active {
            transform: scale(0.98);
        }
        .btn-shared-solid:focus-visible {
            outline: none;
            box-shadow:
                0 0 0 2px rgba(232, 201, 107, 0.75),
                0 0 36px rgba(201, 168, 76, 0.45);
        }
        .btn-shared-light {
            border-radius: 9999px;
            border: 2px solid rgba(255, 255, 255, 0.94);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow:
                0 0 14px rgba(255, 255, 255, 0.2),
                0 0 36px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease, box-shadow 0.35s ease;
        }
        .btn-shared-light:hover {
            background: rgba(255, 255, 255, 0.16);
            box-shadow:
                0 0 28px rgba(255, 255, 255, 0.38),
                0 0 48px rgba(255, 255, 255, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        /* Align Tailwind utility colors with main page palette */
        .bg-\[\#0a0a0a\] { background-color: var(--color-bg) !important; }
        .bg-\[\#111\] { background-color: rgba(26, 26, 26, 0.95) !important; }
        .bg-\[\#1a1a1a\] { background-color: #2a2a2a !important; }
        .text-yellow-500, .text-yellow-600 { color: var(--color-accent) !important; }
        .bg-yellow-600 { background-color: var(--color-accent) !important; }
        .border-yellow-600, .border-yellow-500, .border-yellow-400\/20 { border-color: rgba(201, 168, 76, 0.45) !important; }
        .shadow-yellow-600\/20, .shadow-yellow-900\/20, .shadow-yellow-900\/40 { --tw-shadow-color: rgba(201, 168, 76, 0.35) !important; }

        /* Фильтры: активный чип = та же подсветка, что активный пункт в шапке главной */
        .filter-chip {
            cursor: pointer;
            position: relative;
            z-index: 0;
            border-radius: 9999px;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        .filter-chip::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            z-index: -1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, box-shadow 0.3s ease;
        }
        .filter-chip:focus,
        .filter-chip:focus-visible {
            outline: none;
        }
        .filter-chip-selected::after,
        .filter-chip-selected:hover::after,
        .filter-chip-selected:focus-visible::after {
            opacity: 0;
        }
        .filter-chip-default:hover::after {
            opacity: 0;
        }
        .filter-chip-default:focus-visible::after {
            opacity: 0;
        }
        .filter-chip-selected {
            color: #141414;
            background: linear-gradient(135deg, rgba(232, 201, 107, 0.88), rgba(201, 168, 76, 0.92));
            text-shadow: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38);
        }
        .filter-chip-selected:hover {
            color: #0a0a0a;
            background: linear-gradient(135deg, rgba(237, 210, 130, 0.94), rgba(201, 168, 76, 0.96));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
        }
        .filter-chip-default {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.92);
            box-shadow: none;
        }
        .filter-chip-default:hover {
            color: var(--color-accent-light);
            background: rgba(201, 168, 76, 0.08);
            box-shadow: none;
            text-shadow:
                0 0 16px rgba(232, 201, 107, 0.4),
                0 0 36px rgba(201, 168, 76, 0.16);
        }
        .filter-chip-default:focus-visible {
            box-shadow: 0 0 0 2px rgba(232, 201, 107, 0.5);
        }
        .filter-chip-selected:focus-visible {
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.42),
                0 0 0 2px rgba(255, 255, 255, 0.45);
        }

        header a.brand-home {
            text-decoration: none;
            outline: none;
        }
        header a.brand-home:focus-visible img {
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.75);
            border-radius: 0.75rem;
        }
        header .btn-shared:focus-visible,
        header .gold-outline-btn:focus-visible,
        header .white-outline-btn:focus-visible,
        header .btn-shared-solid:focus-visible {
            outline: none;
        }

        header.site-header {
            z-index: 1000;
            padding-top: calc(1rem + env(safe-area-inset-top, 0px));
            padding-bottom: 1rem;
            padding-left: max(0px, env(safe-area-inset-left, 0px));
            padding-right: max(0px, env(safe-area-inset-right, 0px));
            transition:
                background 0.42s ease,
                backdrop-filter 0.42s ease,
                -webkit-backdrop-filter 0.42s ease,
                border-color 0.42s ease,
                box-shadow 0.42s ease;
        }
        header.site-header:not(.site-header--scrolled) {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-bottom-color: transparent;
            box-shadow: none;
        }
        header.site-header.site-header--scrolled {
            background: rgba(14, 14, 16, 0.74) !important;
            backdrop-filter: blur(18px) saturate(1.35);
            -webkit-backdrop-filter: blur(18px) saturate(1.35);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07) !important;
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.38) !important;
        }

        .brand-logo {
            width: 108px;
            height: auto;
            display: block;
        }

        .phone-link {
            transition: color 0.3s ease;
            text-decoration: none;
            color: #fff;
        }

        .phone-link:hover {
            color: var(--color-accent-light);
        }

        .catalog-nav-btn {
            background: transparent;
            border: 0;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }

        header.site-header nav a.header-nav-hover,
        header.site-header nav button.catalog-nav-btn.header-nav-hover {
            position: relative;
            display: inline-block;
            vertical-align: middle;
            padding: 0.35rem 0.85rem;
            margin: -0.35rem -0.85rem;
            border-radius: 9999px;
            border: none;
            background: transparent;
            outline: none;
            box-shadow: none;
            transition:
                color 0.2s ease,
                background 0.2s ease,
                text-shadow 0.2s ease,
                box-shadow 0.2s ease;
            -webkit-tap-highlight-color: rgba(201, 168, 76, 0.28);
            text-decoration: none;
            color: inherit;
        }

        header.site-header nav a.header-nav-hover:hover,
        header.site-header nav button.catalog-nav-btn.header-nav-hover:hover {
            color: var(--color-accent-light);
            background: rgba(201, 168, 76, 0.08);
            text-shadow: 0 0 18px rgba(232, 201, 107, 0.45), 0 0 40px rgba(201, 168, 76, 0.2);
        }

        header.site-header nav a.header-nav-hover:active,
        header.site-header nav button.catalog-nav-btn.header-nav-hover:active {
            color: var(--color-accent-light);
            background: rgba(201, 168, 76, 0.22);
            text-shadow:
                0 0 26px rgba(232, 201, 107, 0.58),
                0 0 56px rgba(201, 168, 76, 0.3);
            box-shadow:
                0 0 28px rgba(201, 168, 76, 0.45),
                0 0 52px rgba(201, 168, 76, 0.16);
        }

        header.site-header nav a.header-nav-hover:focus-visible,
        header.site-header nav button.catalog-nav-btn.header-nav-hover:focus-visible {
            outline: none;
            color: var(--color-accent-light);
            background: rgba(201, 168, 76, 0.1);
            text-shadow: 0 0 20px rgba(232, 201, 107, 0.5), 0 0 48px rgba(201, 168, 76, 0.22);
        }

        /* Активный раздел страницы каталога — как «текущий» на главной */
        header.site-header nav a.header-nav-hover.header-nav-hover--current,
        header.site-header nav button.catalog-nav-btn.header-nav-hover.header-nav-hover--current {
            color: #141414;
            background: linear-gradient(135deg, rgba(232, 201, 107, 0.88), rgba(201, 168, 76, 0.92));
            text-shadow: none;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.38),
                0 0 22px rgba(201, 168, 76, 0.38),
                0 0 40px rgba(201, 168, 76, 0.15);
        }

        header.site-header nav a.header-nav-hover.header-nav-hover--current:hover,
        header.site-header nav button.catalog-nav-btn.header-nav-hover.header-nav-hover--current:hover,
        header.site-header nav a.header-nav-hover.header-nav-hover--current:focus-visible,
        header.site-header nav button.catalog-nav-btn.header-nav-hover.header-nav-hover--current:focus-visible {
            color: #0a0a0a;
            background: linear-gradient(135deg, rgba(237, 210, 130, 0.94), rgba(201, 168, 76, 0.96));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.42),
                0 0 28px rgba(201, 168, 76, 0.48),
                0 0 52px rgba(201, 168, 76, 0.18);
        }

        header.site-header nav a.header-nav-hover.header-nav-hover--current:active,
        header.site-header nav button.catalog-nav-btn.header-nav-hover.header-nav-hover--current:active {
            color: #0a0a0a;
            background: linear-gradient(135deg, rgba(245, 220, 155, 0.98), rgba(201, 168, 76, 1));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.48),
                0 0 36px rgba(201, 168, 76, 0.58),
                0 0 72px rgba(201, 168, 76, 0.22);
        }

        /* Мобильное меню — те же нажатия и «текущий раздел» (панель не внутри <nav>) */
        header.site-header .mobile-nav-panel a.header-nav-hover,
        header.site-header .mobile-nav-panel button.catalog-nav-btn.header-nav-hover {
            -webkit-tap-highlight-color: rgba(201, 168, 76, 0.28);
            border-radius: 9999px;
            transition:
                color 0.2s ease,
                background 0.2s ease,
                text-shadow 0.2s ease,
                box-shadow 0.2s ease;
        }

        header.site-header .mobile-nav-panel a.header-nav-hover:active,
        header.site-header .mobile-nav-panel button.catalog-nav-btn.header-nav-hover:active {
            color: var(--color-accent-light);
            background: rgba(201, 168, 76, 0.22);
            text-shadow:
                0 0 26px rgba(232, 201, 107, 0.58),
                0 0 56px rgba(201, 168, 76, 0.3);
            box-shadow:
                0 0 28px rgba(201, 168, 76, 0.45),
                0 0 52px rgba(201, 168, 76, 0.16);
        }

        header.site-header .mobile-nav-panel a.header-nav-hover.header-nav-hover--current,
        header.site-header .mobile-nav-panel button.catalog-nav-btn.header-nav-hover.header-nav-hover--current {
            color: #141414;
            background: linear-gradient(135deg, rgba(232, 201, 107, 0.88), rgba(201, 168, 76, 0.92));
            text-shadow: none;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.38),
                0 0 22px rgba(201, 168, 76, 0.38),
                0 0 40px rgba(201, 168, 76, 0.15);
        }

        header.site-header .mobile-nav-panel a.header-nav-hover.header-nav-hover--current:active,
        header.site-header .mobile-nav-panel button.catalog-nav-btn.header-nav-hover.header-nav-hover--current:active {
            color: #0a0a0a;
            background: linear-gradient(135deg, rgba(245, 220, 155, 0.98), rgba(201, 168, 76, 1));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.48),
                0 0 36px rgba(201, 168, 76, 0.58),
                0 0 72px rgba(201, 168, 76, 0.22);
        }

        header.site-header .mobile-nav-panel .header-nav-hover {
            margin-left: auto;
            margin-right: auto;
        }

        .modal-hero-accent {
            color: var(--color-accent);
        }

        /* Карточка каталога: светлая только зона фото, скругление только сверху */
        .catalog-card-media {
            background: #ffffff;
            border-radius: 1.75rem 1.75rem 0 0;
        }
        @media (min-width: 640px) {
            .catalog-card-media {
                border-radius: 3rem 3rem 0 0;
            }
        }

        /* Модалка: белая подложка только вокруг фото, без длинной белой полосы */
        .modal-product-media {
            background: transparent;
        }

        .modal-photo-stage {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 1rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .modal-hero-img {
            background-color: #ffffff !important;

<body>
    <!-- catalog-data.json на сайте · Черновик: cookie после admin.php или ?draft=1 · Как у гостей: ?live=1 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const IconWind = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>;
        const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const CATALOG_LABELS = {
            segment: { all: 'Все', budget: 'Бюджет', comfort: 'Комфорт', premium: 'Премиум' },
            type: { all: 'Любой тип', inverter: 'Инвертор', onoff: 'On/Off' },
        };
        const SEGMENT_FILTER_IDS = ['all', 'budget', 'comfort', 'premium'];
        const TYPE_FILTER_IDS = ['all', 'inverter', 'onoff'];

        const chipSegClass = (seg) => {
            const k = String(seg || '').toLowerCase();
            if (k === 'budget' || k === 'comfort' || k === 'premium') return `catalog-chip--seg-${k}`;
            return 'catalog-chip--seg-fallback';
        };
        const chipTypeClass = (ty) => {
            const k = String(ty || '').toLowerCase();
            if (k === 'inverter') return 'catalog-chip--type-inverter';
            if (k === 'onoff') return 'catalog-chip--type-onoff';
            return 'catalog-chip--type-fallback';
        };

        const productImages = (p) => {
            if (!p) return [];
            if (Array.isArray(p.images) && p.images.length > 0) {
                return p.images.map((u) => String(u || '').trim()).filter(Boolean).slice(0, 5);
            }
            if (p.image && String(p.image).trim()) return [String(p.image).trim()];
            return [];
        };
        const productCardImage = (p) => productImages(p)[0] || '';
        const BASE_BTU_VALUES = [7, 9, 12, 18, 24, 36];
        const withBaseBtuRows = (product) => {
            const sourceRows = Array.isArray(product?.btuData) ? product.btuData : [];
            const byBtu = new Map();
            sourceRows.forEach((row) => {
                const btu = Number(row?.btu);
                if (!Number.isFinite(btu)) return;
                byBtu.set(btu, { btu, price: Number(row?.price) || 0 });
            });
            BASE_BTU_VALUES.forEach((btu) => {
                if (!byBtu.has(btu)) byBtu.set(btu, { btu, price: 0 });
            });
            return {
                ...product,
                btuData: Array.from(byBtu.values()).sort((a, b) => a.btu - b.btu),
            };
        };
        const normalizeBtuData = (p) => Array.isArray(p?.btuData) ? p.btuData.filter((d) => Number.isFinite(Number(d?.price))) : [];
        const minPriceOf = (p) => {
            const rows = normalizeBtuData(p).filter((d) => Number(d.price) > 0);
            if (!rows.length) return null;
            return Math.min(...rows.map((d) => Number(d.price)));
        };
        const formatRubPrice = (value) => (Number.isFinite(Number(value)) && Number(value) > 0 ? Number(value).toLocaleString() + ' ₽' : 'По запросу');

        const CATALOG_DRAFT_COOKIE = 'vershina8848_catalog_draft';
        function readDraftPreviewCookie() {
            if (typeof document === 'undefined') return false;
            var prefix = CATALOG_DRAFT_COOKIE + '=';
            var parts = document.cookie.split(';');
            for (var i = 0; i < parts.length; i++) {
                var c = parts[i].trim();
                if (c.indexOf(prefix) === 0) return decodeURIComponent(c.substring(prefix.length)) === '1';
            }
            return false;
        }
        var __catalogQs = typeof window !== 'undefined' ? new URLSearchParams(window.location.search) : new URLSearchParams();
        var __forceLiveCatalog = __catalogQs.get('live') === '1';
        var __forceDraftParam = __catalogQs.get('draft') === '1';
        var __useDraftCatalog = !__forceLiveCatalog && (__forceDraftParam || readDraftPreviewCookie());
        const catalogDataSrc = __useDraftCatalog ? 'catalog-data-draft.json' : 'catalog-data.json';
        const isDraftPreviewCatalog = __useDraftCatalog;

        const App = () => {
            const [activeTab, setActiveTab] = useState('catalog');
            const [segmentFilter, setSegmentFilter] = useState('all');
            const [typeFilter, setTypeFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedBtu, setSelectedBtu] = useState(null);
            const [galleryIndex, setGalleryIndex] = useState(0);
            const [area, setArea] = useState('');
            const [calcResult, setCalcResult] = useState(null);
            const [products, setProducts] = useState([]);
            const [catalogLoading, setCatalogLoading] = useState(true);
            const [catalogError, setCatalogError] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [headerScrolled, setHeaderScrolled] = useState(false);
            const [draftMissingFallback, setDraftMissingFallback] = useState(false);
            const [imageViewerOpen, setImageViewerOpen] = useState(false);

            const BTU_AREA = {
                7: 21, 8: 21, 9: 27, 10: 30, 12: 36, 14: 42, 18: 54,
                20: 62, 24: 72, 26: 78, 30: 90, 32: 96, 33: 99, 36: 108, 38: 115,
            };
            const areaForBtu = (b) => BTU_AREA[b] ?? Math.min(130, Math.round(Number(b) * 2.9));

            const btuFromAreaM2 = (sq) => {
                const s = Number(sq);
                if (!Number.isFinite(s) || s <= 0) return 7;
                if (s <= 20) return 7;
                if (s <= 35) return 9;
                if (s <= 50) return 12;
                if (s <= 70) return 18;
                return 24;
            };
            const coolingAreaLabelForBtu = (btu) => {
                if (btu === 24) return 'Подходит для помещений свыше 70 м²';
                const cap = { 7: 20, 9: 35, 12: 50, 18: 70 }[btu];
                return 'Подходит для помещений до ' + cap + ' м²';
            };
            const closeMobile = () => setMobileMenuOpen(false);

            const clearCalcHash = () => {
                if (window.location.hash === '#calc') {
                    window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
                }
            };

            const goCatalogTab = () => {
                setActiveTab('catalog');
                clearCalcHash();
            };

            const goCalc = () => {
                setActiveTab('calc');
                if (window.location.hash !== '#calc') {
                    window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}#calc`);
                }
            };

            const applyHashTab = React.useCallback(() => {
                const raw = (window.location.hash || '').replace(/^#/, '').toLowerCase();
                if (raw === 'calc') setActiveTab('calc');
                else setActiveTab('catalog');
            }, []);

            useEffect(() => {
                applyHashTab();
                window.addEventListener('hashchange', applyHashTab);
                return () => window.removeEventListener('hashchange', applyHashTab);
            }, [applyHashTab]);

            useEffect(() => {
                if (isDraftPreviewCatalog && document.title.indexOf('чернов') === -1) {
                    document.title = 'Просмотр черновика · ' + document.title;
                }
            }, []);

            useEffect(() => {
                const lock = !!(selectedProduct || mobileMenuOpen);
                if (!lock) {
                    document.body.classList.remove('mobile-nav-overflow-lock');
                    return undefined;
                }
                const prevOverflow = document.body.style.overflow;
                document.body.style.overflow = 'hidden';
                if (mobileMenuOpen && !selectedProduct) {
                    document.body.classList.add('mobile-nav-overflow-lock');
                } else {
                    document.body.classList.remove('mobile-nav-overflow-lock');
                }
                return () => {
                    document.body.style.overflow = prevOverflow;
                    document.body.classList.remove('mobile-nav-overflow-lock');
                };
            }, [selectedProduct, mobileMenuOpen]);

            useEffect(() => {
                const onScroll = () => setHeaderScrolled(window.scrollY > 40);
                onScroll();
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            useEffect(() => {
                if (!selectedProduct) setImageViewerOpen(false);
            }, [selectedProduct]);

            useEffect(() => {
                if (!imageViewerOpen) return;
                const onKey = (e) => {
                    if (e.key === 'Escape') {
                        setImageViewerOpen(false);
                        return;
                    }
                    const g = selectedProduct ? productImages(selectedProduct) : [];
                    if (g.length <= 1) return;
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        setGalleryIndex((i) => (i - 1 + g.length) % g.length);
                    }
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        setGalleryIndex((i) => (i + 1) % g.length);
                    }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [imageViewerOpen, selectedProduct]);

            useEffect(() => {
                let cancelled = false;
                const load = async () => {
                    setCatalogLoading(true);
                    setCatalogError(null);
                    try {
                        const qs = catalogDataSrc === 'catalog-data-draft.json' ? `?v=${Date.now()}` : '';
                        let res = await fetch(catalogDataSrc + qs, { cache: 'no-store' });
                        if (!res.ok && isDraftPreviewCatalog && res.status === 404) {
                            res = await fetch('catalog-data.json', { cache: 'no-store' });
                            if (res.ok && !cancelled) setDraftMissingFallback(true);
                        }
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const data = await res.json();
                        if (cancelled) return;
                        if (!Array.isArray(data)) throw new Error('Ожидался массив товаров');
                        setProducts(data.map(withBaseBtuRows));
                    } catch (e) {
                        if (!cancelled) setCatalogError(e.message || String(e));
                    } finally {
                        if (!cancelled) setCatalogLoading(false);
                    }
                };
                load();
                return () => { cancelled = true; };
            }, []);

            const filteredProducts = useMemo(() => {
                let list = products;
                if (segmentFilter !== 'all') list = list.filter(p => p.segment === segmentFilter);
                if (typeFilter !== 'all') list = list.filter(p => p.type === typeFilter);
                return list;
            }, [products, segmentFilter, typeFilter]);

            const calcRecommendations = useMemo(() => {
                if (!calcResult || !products.length) return [];
                const btu = calcResult.btu;
                const matches = products.filter((p) => p.btuData.some((d) => d.btu === btu && Number(d.price) > 0));
                matches.sort((a, b) => {
                    const pa = a.btuData.find((d) => d.btu === btu).price;
                    const pb = b.btuData.find((d) => d.btu === btu).price;
                    return pa - pb;
                });
                return matches.slice(0, 3);
            }, [calcResult, products]);

            const openProduct = (p) => {
                setGalleryIndex(0);
                setSelectedProduct(p);
                const target = calcResult ? p.btuData.find(d => d.btu === calcResult.btu) : p.btuData[0];
                setSelectedBtu(target || p.btuData[0]);
            };

            const modalGallery = selectedProduct ? productImages(selectedProduct) : [];
            const modalGalleryIndex = modalGallery.length
                ? Math.min(galleryIndex, modalGallery.length - 1)
                : 0;
            const modalHeroSrc = modalGallery.length ? modalGallery[modalGalleryIndex] : productCardImage(selectedProduct);

            return (
                <div className="min-h-screen flex flex-col bg-[var(--color-bg)]">
                    <header className={`site-header fixed top-0 left-0 right-0${headerScrolled ? ' site-header--scrolled' : ''}${selectedProduct ? ' hidden' : ''}`} aria-hidden={selectedProduct ? 'true' : undefined}>
                        <div className="container mx-auto px-4 sm:px-6 flex w-full max-w-none items-center gap-3 sm:gap-4 justify-between md:justify-start relative">
                            <a href="/" className="flex shrink-0 items-center gap-2 no-underline outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-accent)] rounded-md" aria-label="8848 Вершина — главная">
                                <svg className="w-9 h-9 shrink-0 text-[var(--color-accent)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3 4 10v11h16V10l-8-7z"/><path strokeLinecap="round" strokeLinejoin="round" d="M9 21v-6h6v6"/></svg>
                                <span className="flex flex-col leading-none">
                                    <span className="text-lg font-numbers-bold tracking-tight bg-gradient-to-br from-[var(--color-accent-light)] to-[var(--color-accent)] bg-clip-text text-transparent">8848</span>
                                    <span className="text-[0.55rem] uppercase tracking-[0.35em] text-white/90 mt-0.5 font-title">Вершина</span>
                                </span>
                            </a>
                            <nav className="hidden md:flex flex-wrap gap-x-4 lg:gap-x-6 gap-y-2 justify-center items-center text-xs lg:text-sm font-medium uppercase tracking-widest text-white min-w-0 absolute left-1/2 -translate-x-1/2">

                                    className={`header-nav-hover${activeTab === 'catalog' ? ' header-nav-hover--current' : ''}`}

                                            goCatalogTab();

                                    aria-current={activeTab === 'catalog' ? 'page' : undefined}

                                    type="button"
                                    onClick={goCalc}
                                    className={`catalog-nav-btn header-nav-hover text-white font-title uppercase tracking-widest text-sm font-medium${activeTab === 'calc' ? ' header-nav-hover--current' : ''}`}
                                    aria-pressed={activeTab === 'calc'}
                                >
                                    Калькулятор
                                </button>
                                <a href="/#pricing" className="header-nav-hover">Прайс</a>
                                <a href="/#services" className="header-nav-hover">Услуги</a>
                                <a href="/#contacts" className="header-nav-hover">Контакты</a>
                            </nav>

                                type="button"
                                className="md:hidden text-white focus:outline-none p-1 shrink-0"
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}

                            >
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                            </button>
                        </div>
                        {mobileMenuOpen && (
                            <div className="mobile-nav-panel mobile-nav-panel-scroll md:hidden border-t border-white/10 bg-[#1a1a1a]/98 mx-4 sm:mx-6 mt-3 pt-4 px-4 flex flex-col gap-3 text-center text-white rounded-2xl shadow-2xl shadow-black/50">
                                <a href="/#hero" className="py-1 header-nav-hover" onClick={closeMobile}>Главная</a>
                                <a
                                    href="/catalog/"
                                    className={`py-1 header-nav-hover${activeTab === 'catalog' ? ' header-nav-hover--current' : ''}`}
                                    onClick={(e) => {
                                        if (activeTab === 'calc') {
                                            e.preventDefault();
                                            goCatalogTab();
                                            closeMobile();
                                            return;
                                        }
                                        closeMobile();
                                    }}
                                    aria-current={activeTab === 'catalog' ? 'page' : undefined}
                                >
                                    Каталог
                                </a>
                                <button
                                    type="button"
                                    className={`catalog-nav-btn header-nav-hover py-1 text-white${activeTab === 'calc' ? ' header-nav-hover--current' : ''}`}
                                    onClick={() => { goCalc(); closeMobile(); }}
                                    aria-pressed={activeTab === 'calc'}
                                >
                                    Калькулятор
                                </button>
                                <a href="/#pricing" className="py-1 header-nav-hover" onClick={closeMobile}>Прайс</a>
                                <a href="/#services" className="py-1 header-nav-hover" onClick={closeMobile}>Услуги</a>
                                <a href="/#contacts" className="py-1 header-nav-hover" onClick={closeMobile}>Контакты</a>
                            </div>
