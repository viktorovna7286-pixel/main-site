        /* Фильтры: подсветка без рамки — только фон + мягкое свечение */
        .filter-chip {

<body>
    <!-- catalog-data.json на сайте · Черновик: cookie после admin.php или ?draft=1 · Как у гостей: ?live=1 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const IconWind = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>;
        const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconTruck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>;

        const CATALOG_LABELS = {
            segment: { all: 'Все', budget: 'Бюджет', comfort: 'Комфорт', premium: 'Премиум' },
            type: { all: 'Любой тип', inverter: 'Инвертор', onoff: 'On/Off' },
        };
        const SEGMENT_FILTER_IDS = ['all', 'budget', 'comfort', 'premium'];
        const TYPE_FILTER_IDS = ['all', 'inverter', 'onoff'];

        const chipSegClass = (seg) => {
            const k = String(seg || '').toLowerCase();
            if (k === 'budget' || k === 'comfort' || k === 'premium') return `catalog-chip--seg-${k}`;
            return 'catalog-chip--seg-fallback';
        };
        const chipTypeClass = (ty) => {
            const k = String(ty || '').toLowerCase();
            if (k === 'inverter') return 'catalog-chip--type-inverter';
            if (k === 'onoff') return 'catalog-chip--type-onoff';
            return 'catalog-chip--type-fallback';
        };

        const productImages = (p) => {
            if (!p) return [];
            if (Array.isArray(p.images) && p.images.length > 0) {
                return p.images.map((u) => String(u || '').trim()).filter(Boolean).slice(0, 5);
            }
            if (p.image && String(p.image).trim()) return [String(p.image).trim()];
            return [];
        };
        const productCardImage = (p) => productImages(p)[0] || '';

        const CATALOG_DRAFT_COOKIE = 'vershina8848_catalog_draft';
        function readDraftPreviewCookie() {
            if (typeof document === 'undefined') return false;
            var prefix = CATALOG_DRAFT_COOKIE + '=';
            var parts = document.cookie.split(';');
            for (var i = 0; i < parts.length; i++) {
                var c = parts[i].trim();
                if (c.indexOf(prefix) === 0) return decodeURIComponent(c.substring(prefix.length)) === '1';
            }
            return false;
        }
        var __catalogQs = typeof window !== 'undefined' ? new URLSearchParams(window.location.search) : new URLSearchParams();
        var __forceLiveCatalog = __catalogQs.get('live') === '1';
        var __forceDraftParam = __catalogQs.get('draft') === '1';
        var __useDraftCatalog = !__forceLiveCatalog && (__forceDraftParam || readDraftPreviewCookie());
        const catalogDataSrc = __useDraftCatalog ? 'catalog-data-draft.json' : 'catalog-data.json';
        const isDraftPreviewCatalog = __useDraftCatalog;

        const App = () => {
            const [activeTab, setActiveTab] = useState('catalog');
            const [segmentFilter, setSegmentFilter] = useState('all');
            const [typeFilter, setTypeFilter] = useState('all');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedBtu, setSelectedBtu] = useState(null);
            const [galleryIndex, setGalleryIndex] = useState(0);
            const [area, setArea] = useState('');
            const [calcResult, setCalcResult] = useState(null);
            const [products, setProducts] = useState([]);
            const [catalogLoading, setCatalogLoading] = useState(true);
            const [catalogError, setCatalogError] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [headerScrolled, setHeaderScrolled] = useState(false);
            const [draftMissingFallback, setDraftMissingFallback] = useState(false);

            const BTU_AREA = {
                7: 20, 8: 21, 9: 25, 10: 26, 12: 35, 14: 40, 18: 52,
                20: 56, 24: 70, 26: 74, 30: 85, 32: 90, 33: 95, 36: 100, 38: 115,
            };
            const areaForBtu = (b) => BTU_AREA[b] ?? Math.min(130, Math.round(Number(b) * 2.9));


            const closeMobile = () => setMobileMenuOpen(false);

            const goCalc = () => {
                setActiveTab('calc');
                if (window.location.hash !== '#calc') {
                    window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}#calc`);
                }
            };

            const clearCalcHash = () => {
                if (window.location.hash === '#calc') {
                    window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
                }
            };

            const applyHashTab = React.useCallback(() => {
                const raw = (window.location.hash || '').replace(/^#/, '').toLowerCase();
                if (raw === 'calc') setActiveTab('calc');
            }, []);

            useEffect(() => {
                applyHashTab();
                window.addEventListener('hashchange', applyHashTab);
                return () => window.removeEventListener('hashchange', applyHashTab);
            }, [applyHashTab]);

            useEffect(() => {
                if (isDraftPreviewCatalog && document.title.indexOf('чернов') === -1) {
                    document.title = 'Просмотр черновика · ' + document.title;
                }
            }, []);

            useEffect(() => {
                const onScroll = () => setHeaderScrolled(window.scrollY > 40);
                onScroll();
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            useEffect(() => {
                let cancelled = false;
                const load = async () => {
                    setCatalogLoading(true);
                    setCatalogError(null);
                    try {
                        const qs = catalogDataSrc === 'catalog-data-draft.json' ? `?v=${Date.now()}` : '';
                        let res = await fetch(catalogDataSrc + qs, { cache: 'no-store' });
                        if (!res.ok && isDraftPreviewCatalog && res.status === 404) {
                            res = await fetch('catalog-data.json', { cache: 'no-store' });
                            if (res.ok && !cancelled) setDraftMissingFallback(true);
                        }
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const data = await res.json();
                        if (cancelled) return;
                        if (!Array.isArray(data)) throw new Error('Ожидался массив товаров');
                        setProducts(data);
                    } catch (e) {
                        if (!cancelled) setCatalogError(e.message || String(e));
                    } finally {
                        if (!cancelled) setCatalogLoading(false);
                    }
                };
                load();
                return () => { cancelled = true; };
            }, []);

            const filteredProducts = useMemo(() => {
                let list = products;
                if (segmentFilter !== 'all') list = list.filter(p => p.segment === segmentFilter);
                if (typeFilter !== 'all') list = list.filter(p => p.type === typeFilter);
                if (calcResult) list = list.filter(p => p.btuData.some(d => d.btu === calcResult.btu));
                return list;
            }, [products, segmentFilter, typeFilter, calcResult]);

            const openProduct = (p) => {
                setGalleryIndex(0);
                setSelectedProduct(p);
                const target = calcResult ? p.btuData.find(d => d.btu === calcResult.btu) : p.btuData[0];
                setSelectedBtu(target || p.btuData[0]);
            };

            const modalGallery = selectedProduct ? productImages(selectedProduct) : [];
            const modalGalleryIndex = modalGallery.length
                ? Math.min(galleryIndex, modalGallery.length - 1)
                : 0;
            const modalHeroSrc = modalGallery.length ? modalGallery[modalGalleryIndex] : productCardImage(selectedProduct);

            return (
                <div className="min-h-screen flex flex-col bg-[var(--color-bg)]">
                    <header className={`site-header fixed top-0 left-0 right-0 py-4${headerScrolled ? ' site-header--scrolled' : ''}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <a href="/" className="block shrink-0" aria-label="8848 ВЕРШИНА — на главную">
                                <img src="../assets/logo-8848.png" alt="8848 ВЕРШИНА" className="brand-logo" />
                            </a>
                            <nav className="hidden md:flex flex-wrap gap-x-6 gap-y-2 justify-end items-center text-sm font-medium uppercase tracking-widest text-white">
                                <a href="/#hero" className="header-nav-hover">Главная</a>
                                <a href="/catalog/" className="header-nav-hover">Каталог</a>
                                <button type="button" onClick={goCalc} className="catalog-nav-btn header-nav-hover text-white font-title uppercase tracking-widest text-sm font-medium">
                                    Калькулятор
                                </button>
                                <a href="/#pricing" className="header-nav-hover">Прайс</a>
                                <a href="/#services" className="header-nav-hover">Услуги</a>
                                <a href="/#contacts" className="header-nav-hover">Контакты</a>
                            </nav>
                            <div className="hidden lg:flex items-center shrink-0">
                                <a href="tel:89996368698" className="text-lg phone-link font-numbers-bold">8 999 636 86 98</a>
                            </div>
                            <button
                                type="button"
                                className="md:hidden text-white focus:outline-none p-1"
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                aria-expanded={mobileMenuOpen}
                                aria-label="Меню"
                            >
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                            </button>
                        </div>
                        {mobileMenuOpen && (
                            <div className="mobile-nav-panel md:hidden border-t border-white/10 bg-[#1a1a1a]/98 mx-6 mt-3 pt-4 pb-4 px-4 flex flex-col gap-3 text-center text-white">
                                <a href="/#hero" className="py-1 header-nav-hover" onClick={closeMobile}>Главная</a>
                                <a href="/catalog/" className="py-1 header-nav-hover" onClick={closeMobile}>Каталог</a>
                                <button type="button" className="catalog-nav-btn header-nav-hover py-1 text-white" onClick={() => { goCalc(); closeMobile(); }}>Калькулятор</button>
                                <a href="/#pricing" className="py-1 header-nav-hover" onClick={closeMobile}>Прайс</a>
                                <a href="/#services" className="py-1 header-nav-hover" onClick={closeMobile}>Услуги</a>
                                <a href="/#contacts" className="py-1 header-nav-hover" onClick={closeMobile}>Контакты</a>
                                <a href="tel:89996368698" className="text-yellow-600 font-numbers-bold pt-2" onClick={closeMobile}>8 999 636 86 98</a>
                            </div>
                        )}
                    </header>

                    <div className="flex-1 pt-24 md:pt-28">

                    {isDraftPreviewCatalog && draftMissingFallback && (
                        <div
                            className="mx-6 max-w-7xl xl:mx-auto mb-5 rounded-3xl px-5 py-3 text-center font-main border border-white/15 bg-[#2a2618] text-gray-200 shadow-xl"
                            role="status"
                        >
                            <strong className="uppercase tracking-wider text-[11px] md:text-xs text-amber-200/90">Черновик ещё не создан</strong>
                            <span className="text-[11px] md:text-sm md:ml-2 block md:inline mt-1 md:mt-0">
                                Показан опубликованный каталог. Зайдите в админку один раз — файл черновика появится сам.
                            </span>
                            <a href="admin.php" className="ml-2 font-bold text-amber-400 underline underline-offset-2 hover:no-underline text-[11px] md:text-sm whitespace-nowrap inline-block mt-2 md:mt-0 md:ml-4">
                                Админка
                            </a>
                        </div>
                    )}
                    {isDraftPreviewCatalog && !draftMissingFallback && (
                        <div
                            className="mx-6 max-w-7xl xl:mx-auto mb-5 rounded-3xl px-5 py-3 text-center font-main text-black border border-amber-400/70 shadow-xl"
                            style={{ background: 'linear-gradient(90deg,rgba(250,230,158,.94),rgba(201,168,76,.92),rgba(250,230,158,.94))' }}
                            role="status"
                        >
                            <strong className="uppercase tracking-wider text-[11px] md:text-xs">Просмотр черновика</strong>
                            <span className="opacity-95 text-[11px] md:text-sm md:ml-2 block md:inline mt-1 md:mt-0">
                                Гости видят только опубликованный каталог. Черновик подставляется автоматически после входа в админку (в этом браузере). Выйдите из админки — снова будет опубликованная версия.
                            </span>
                            <a
                                href="index.html?live=1"
                                className="ml-2 font-bold underline underline-offset-2 hover:no-underline text-[11px] md:text-sm whitespace-nowrap inline-block mt-2 md:mt-0 md:ml-4"
                            >
                                Смотреть как у гостей
                            </a>
                        </div>
                    )}

                    {activeTab === 'calc' ? (
                        <div className="px-6 py-12 max-w-lg mx-auto fade-in">
                            <div className="text-center">
                                <h2 className="text-3xl font-title mb-4 uppercase italic tracking-tighter text-yellow-500">Ваша площадь?</h2>
                                <p className="text-gray-500 text-sm mb-12 font-main">Введите м², и мы подберем мощность с запасом для долгой службы.</p>
                                <input type="number" value={area} onChange={(e) => setArea(e.target.value)} placeholder="0" className="w-full bg-transparent border-b-4 border-yellow-600 py-6 font-numbers text-8xl text-center outline-none mb-12 placeholder:text-gray-900 focus:border-white transition-all" />
                                <button onClick={() => {
                                    const s = parseFloat(area);
                                    if (!s) return;
                                    let btu = 7;
                                    let reason = "";
                                    if (s > 17 && s <= 21) { btu = 9; reason = "Площадь близка к пределу 07 модели. Рекомендуем 09: она охладит быстрее и прослужит на 30% дольше."; }
                                    else if (s > 21 && s <= 25) { btu = 9; }
                                    else if (s > 25 && s <= 30) { btu = 12; reason = "Для 25+ м² 09 модели может не хватить. Выбрана 12 модель для стабильного комфорта в жару."; }
                                    else if (s > 30 && s <= 35) { btu = 12; }
                                    else if (s > 35) { btu = 18; }
                                    setCalcResult({ btu, area: s, reason });
                                    setActiveTab('catalog');
                                    clearCalcHash();
                                }} className="w-full btn-shared-solid font-title py-6 uppercase tracking-widest">Рассчитать</button>
                            </div>
                        </div>
                    ) : (
                        <main className="px-6 max-w-7xl mx-auto pb-16">
                            {catalogLoading && (
                                <p className="text-center text-gray-500 py-16 font-main">Загрузка каталога…</p>
                            )}
                            {catalogError && !catalogLoading && (
                                <div className="p-8 text-center rounded-3xl bg-red-950/40 border border-red-800 text-red-200 font-main">
                                    Не удалось загрузить <span className="font-mono text-white">{catalogDataSrc}</span>: {catalogError}
                                    <p className="text-sm text-gray-500 mt-2">Для режима черновика нужен файл catalog-data-draft.json в папке catalog. Откройте сайт через HTTP/S с папкой /catalog/</p>
                                </div>
                            )}
                            {!catalogLoading && !catalogError && products.length === 0 && (
                                <p className="text-center text-gray-500 py-16 font-main">Каталог пуст. Добавьте позиции в админке.</p>
                            )}
                            {calcResult && (
                                <div className="p-6 bg-yellow-600 text-black rounded-[2.5rem] mb-12 shadow-2xl fade-in border-4 border-yellow-400/20">
                                    <div className="flex items-start gap-4 mb-4 font-title">
                                        <IconZap />
                                        <div className="flex-1">
                                            <p className="text-xl uppercase italic leading-none tracking-tight">Рекомендация: <span className="font-numbers-bold">{calcResult.btu}</span> BTU</p>
                                            <p className="text-xs font-bold mt-3 opacity-90 leading-relaxed font-main">{calcResult.reason || `Оптимальный выбор для ${calcResult.area} м².`}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setCalcResult(null)} className="text-[10px] font-title uppercase underline decoration-2 underline-offset-4">Показать все модели</button>
                                </div>
                            )}

                            {!catalogLoading && !catalogError && !calcResult && (
                                <div className="mb-10 space-y-4">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                        {SEGMENT_FILTER_IDS.map((id) => (
                                            <button type="button" key={id} onClick={() => setSegmentFilter(id)} className={`filter-chip px-6 py-3 text-sm font-title uppercase tracking-widest transition-all ${segmentFilter === id ? 'filter-chip-selected' : 'filter-chip-default'}`}>{CATALOG_LABELS.segment[id]}</button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                        {TYPE_FILTER_IDS.map((id) => (
                                            <button type="button" key={id} onClick={() => setTypeFilter(id)} className={`filter-chip px-5 py-2 text-sm font-title uppercase tracking-widest transition-all ${typeFilter === id ? 'filter-chip-selected' : 'filter-chip-default'}`}>{CATALOG_LABELS.type[id]}</button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {!catalogLoading && !catalogError && <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 items-stretch">
                                {filteredProducts.map(p => {
                                    const minPrice = Math.min(...p.btuData.map(d => d.price));
                                    const currentPrice = calcResult ? p.btuData.find(d => d.btu === calcResult.btu)?.price : minPrice;
                                    
                                    return (
                                        <div key={p.id} onClick={() => openProduct(p)} className="fade-in group catalog-card-hit premium-card rounded-[3rem] overflow-hidden border border-white/5 cursor-pointer active:scale-95 h-full min-h-[24rem] flex flex-col">
                                            <div className="h-48 shrink-0 relative overflow-hidden">
                                                <img src={productCardImage(p)} className="w-full h-full object-cover grayscale-[0.35] group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000 opacity-80" alt={p.series} />
                                                <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
                                                <div className="absolute top-5 left-5 flex flex-col gap-1">
                                                    <span className={`catalog-chip ${chipSegClass(p.segment)}`}>{CATALOG_LABELS.segment[String(p.segment || '').toLowerCase()] || p.segment}</span>
                                                    <span className={`catalog-chip ${chipTypeClass(p.type)}`}>{CATALOG_LABELS.type[String(p.type || '').toLowerCase()] || p.type}</span>
                                                </div>
                                            </div>
                                            <div className="p-7 flex flex-col flex-1 min-h-[10rem]">
                                                <div className="flex-1 flex flex-col">
                                                    <p className="text-[10px] text-yellow-600 font-title uppercase mb-1 tracking-widest">{p.brand} — завод {p.factory}</p>
                                                    <h3 className="text-base font-title uppercase italic text-white/90 leading-tight line-clamp-2">{p.series}</h3>
                                                    <p className="text-[10px] sm:text-[11px] text-gray-300 font-numbers uppercase mt-1.5 tracking-wide line-clamp-2">{p.model || '—'}</p>
                                                </div>
                                                <div className="flex justify-between items-end border-t border-white/5 pt-5 mt-auto">
                                                    <div>
                                                        <span className="text-[8px] text-gray-500 font-title uppercase tracking-tighter">Цена</span>
                                                        <p className="text-yellow-500 font-numbers-bold text-xl leading-none tracking-tight">
                                                            {calcResult ? `${currentPrice.toLocaleString()} р.` : `от ${minPrice.toLocaleString()} р.`}
                                                        </p>
                                                    </div>
                                                    <div className="bg-yellow-600/10 p-2 rounded-xl text-yellow-600 group-hover:bg-yellow-600 group-hover:text-black transition-colors">
                                                        <IconCheck />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>}
                        </main>
                    )}

                    </div>

                    {selectedProduct && (
                        <div
                            role="dialog"
                            aria-modal="true"
                            aria-label="Карточка товара"
                            className="fixed inset-0 z-[60] flex items-center justify-center bg-black/98 backdrop-blur-2xl p-2 sm:p-4 fade-in"
                            onClick={() => setSelectedProduct(null)}
                        >
                            <div
                                className="bg-[#111] w-full max-w-2xl rounded-[2.5rem] overflow-hidden border border-yellow-600/20 h-[96vh] sm:h-[92vh] shadow-2xl flex flex-col relative z-[1]"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="relative h-40 sm:h-48 shrink-0">
                                    <img src={modalHeroSrc} alt="" className="w-full h-full object-cover pointer-events-none select-none" />
                                    <div className="pointer-events-none absolute inset-0 bg-gradient-to-b from-black/75 via-black/55 to-black/92"></div>
                                    {modalGallery.length > 1 && (
                                        <div className="absolute top-14 left-3 right-14 z-[6] flex gap-1.5 overflow-x-auto no-scrollbar py-1 pointer-events-auto">
                                            {modalGallery.map((src, idx) => (
                                                <button
                                                    type="button"
                                                    key={idx}
                                                    onClick={(e) => { e.stopPropagation(); setGalleryIndex(idx); }}
                                                    className={`shrink-0 w-12 h-12 rounded-lg overflow-hidden border-2 transition-colors ${modalGalleryIndex === idx ? 'border-yellow-500 shadow-[0_0_12px_rgba(201,168,76,0.45)]' : 'border-white/25 hover:border-yellow-600/50'}`}
                                                >
                                                    <img src={src} className="w-full h-full object-cover" alt="" />
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    <button
                                        type="button"
                                        onClick={() => setSelectedProduct(null)}
                                        className="absolute top-4 right-4 z-[5] cursor-pointer w-11 h-11 bg-black/70 hover:bg-black/90 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-yellow-600/35 shadow-xl transition-colors"
                                        aria-label="Закрыть"
                                    >
                                        <IconX />
                                    </button>
                                    <div className="pointer-events-none absolute bottom-4 left-4 right-[3.75rem] max-w-[90%]">
                                        <span className="modal-hero-accent text-[10px] sm:text-xs font-title uppercase tracking-[0.28em] mb-1 block drop-shadow-[0_1px_12px_rgba(0,0,0,.9)]">{selectedProduct.brand} — завод {selectedProduct.factory}</span>
                                        <h3 className="text-xl sm:text-2xl md:text-3xl font-title uppercase italic tracking-tight leading-tight text-white drop-shadow-[0_2px_16px_rgba(0,0,0,.85)]">{selectedProduct.series}</h3>
                                        {selectedProduct.model && (
                                            <p className="text-xs sm:text-sm text-white font-numbers uppercase tracking-wide mt-2 drop-shadow-[0_1px_10px_rgba(0,0,0,.95)]">{selectedProduct.model}</p>
                                        )}
                                        <div className="flex flex-wrap gap-1 mt-2.5 modal-hero-chip-row">
                                            <span className={`catalog-chip ${chipSegClass(selectedProduct.segment)}`}>{CATALOG_LABELS.segment[String(selectedProduct.segment || '').toLowerCase()] || selectedProduct.segment}</span>
                                            <span className={`catalog-chip ${chipTypeClass(selectedProduct.type)}`}>{CATALOG_LABELS.type[String(selectedProduct.type || '').toLowerCase()] || selectedProduct.type}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 sm:p-8 relative font-main flex-1 flex flex-col min-h-0 overflow-y-auto">
                                    <div className="flex flex-col items-end mb-6 gap-1">
                                        <p className="text-[9px] font-title uppercase text-gray-500 tracking-[0.25em]">РРЦ для выбранной мощности</p>
                                        <p className="text-4xl font-numbers-bold text-yellow-500 leading-none tracking-tighter">{selectedBtu?.price.toLocaleString()} р.</p>
                                        <p className="text-[10px] sm:text-[11px] font-title text-gray-500 uppercase tracking-wide mt-1.5">ориентир подборки · до ~{areaForBtu(selectedBtu?.btu)} м²</p>
                                    </div>
                                    
                                    <div className="mb-5">
                                        <h4 className="text-[10px] font-title text-gray-500 uppercase tracking-[0.3em] mb-3 ml-1 italic">Выберите мощность:</h4>
                                        <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">

                                                    type="button"
                                                    key={item.btu}

                                                    className={`py-3 rounded-2xl flex flex-col items-center justify-center transition-all border-2 ${selectedBtu?.btu === item.btu ? 'bg-yellow-600 border-yellow-500 shadow-[0_0_28px_rgba(201,168,76,0.5),0_8px_24px_rgba(0,0,0,0.35)]' : 'bg-black border-white/5 text-gray-600 hover:border-yellow-600/35 hover:shadow-[0_0_16px_rgba(201,168,76,0.12)]'}`}
                                                >
                                                    <span className={`text-lg font-numbers-bold leading-none ${selectedBtu?.btu === item.btu ? 'text-black' : 'text-white'}`}>{item.btu}</span>
                                                    <span className={`text-[7px] font-title uppercase tracking-tighter mt-0.5 ${selectedBtu?.btu === item.btu ? 'text-black/50' : 'opacity-45'}`}>btu</span>

                                    </div>

                                    <div className="grid grid-cols-3 gap-2 mb-5 font-title">
                                        <div className="bg-[#1a1a1a] p-3 rounded-2xl border border-white/5 flex flex-col items-center text-center">
                                            <div className="text-yellow-600 mb-1"><IconClock /></div>
                                            <p className="text-[8px] uppercase text-gray-500 mb-1">Монтаж</p>
                                            <p className="text-[10px] text-white tracking-tight">24 часа</p>
                                        </div>
                                        <div className="bg-[#1a1a1a] p-3 rounded-2xl border border-white/5 flex flex-col items-center text-center">
                                            <div className="text-yellow-600 mb-1"><IconShield /></div>
                                            <p className="text-[8px] uppercase text-gray-500 mb-1">Гарантия</p>
                                            <p className="text-[10px] text-white tracking-tight">1 год</p>
                                        </div>
                                        <div className="bg-[#1a1a1a] p-3 rounded-2xl border border-white/5 flex flex-col items-center text-center">
                                            <div className="text-yellow-600 mb-1"><IconTruck /></div>
                                            <p className="text-[8px] uppercase text-gray-500 mb-1">Доставка</p>
                                            <p className="text-[10px] text-yellow-500 italic tracking-tight">Бесплатно</p>
                                        </div>
                                    </div>

                                    <a href={`https://wa.me/79996368698?text=Заказ: ${selectedProduct.brand} - завод ${selectedProduct.factory}. Мощность ${selectedBtu?.btu} BTU. Цена: ${selectedBtu?.price}р.`} className="w-full btn-shared-solid font-title py-4 flex items-center justify-center gap-4 uppercase tracking-[0.3em] text-sm mt-auto">
                                        <IconZap /> Оформить заявку
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="site-footer mt-auto py-12 border-t border-gray-800">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-sm text-gray-500 uppercase tracking-widest">© 2026 8848 ВЕРШИНА</div>
                            <div className="italic text-gold-gradient font-light">после нас, свежее только на Эвересте</div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
