                { id: 12, brand: 'JAX', factory: 'Haier', series: 'Brisbane inverter', model: 'ACiU-09HE', segment: 'comfort', type: 'inverter', btuData: [{ btu: 9, price: 38900 }, { btu: 12, price: 44900 }], description: 'Высокая энергоэффективность А++ и работа на обогрев.', image: 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?auto=format&fit=crop&q=80&w=800' },
                { id: 13, brand: 'Ballu', factory: 'Midea', series: 'Lagoon', model: 'BSD-07HN1', segment: 'comfort', type: 'onoff', btuData: [{ btu: 7, price: 25990 }, { btu: 9, price: 28990 }], description: 'Улучшенная фильтрация и очень тихий внутренний блок.', image: 'https://images.unsplash.com/photo-1585338107529-13afc5f0158f?auto=format&fit=crop&q=80&w=800' },

                { id: 15, brand: 'Loriot', factory: 'AUX', series: 'Skyline Inverter', model: 'LAC-07AQI', segment: 'comfort', type: 'inverter', btuData: [{ btu: 7, price: 35600 }, { btu: 9, price: 38900 }], description: 'Инвертор от завода AUX. Плавная работа и низкий уровень шума.', image: 'https://images.unsplash.com/photo-1621905251918-48416bd8575a?auto=format&fit=crop&q=80&w=800' },

                { id: 20, brand: 'Midea', factory: 'Midea', series: 'Primary Inverter', model: 'MSAG3-07N8', segment: 'comfort', type: 'inverter', btuData: [{ btu: 7, price: 44490 }, { btu: 9, price: 47490 }, { btu: 12, price: 52490 }], description: 'Золотое напыление теплообменника и премиальный компрессор.', image: 'https://images.unsplash.com/photo-1560706834-bd185617b35a?auto=format&fit=crop&q=80&w=800' },

                { id: 22, brand: 'Haier', factory: 'Haier', series: 'ProCool Dual Inv', segment: 'premium', type: 'inverter', btuData: [{ btu: 9, price: 68900 }], description: 'Двухступенчатая очистка IFD и супер-эффективное охлаждение.', image: 'https://images.unsplash.com/photo-1545241047-6083a3684587?auto=format&fit=crop&q=80&w=800' },

            }, [segmentFilter, typeFilter, calcResult]);

            const openProduct = (p) => {
                setSelectedProduct(p);
                const target = calcResult ? p.btuData.find(d => d.btu === calcResult.btu) : p.btuData[0];

                        <button onClick={() => setActiveTab('calc')} className={`flex-1 py-4 rounded-2xl text-[10px] font-title uppercase tracking-widest border transition-all ${activeTab === 'calc' ? 'bg-yellow-600 text-black border-yellow-600 shadow-xl shadow-yellow-600/20' : 'bg-[#1a1a1a] text-gray-500 border-white/5'}`}>Умный подбор</button>

                                    const s = parseFloat(area);
                                    if (!s) return;
                                    let btu = 7;
                                    let reason = "";

                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {filteredProducts.map(p => {
                                    const minPrice = Math.min(...p.btuData.map(d => d.price));
                                    const currentPrice = calcResult ? p.btuData.find(d => d.btu === calcResult.btu)?.price : minPrice;
                                    
                                    return (
                                        <div key={p.id} onClick={() => openProduct(p)} className="fade-in group premium-card rounded-[3rem] overflow-hidden border border-white/5 hover:border-yellow-600/40 transition-all duration-500 cursor-pointer shadow-xl active:scale-95">
                                            <div className="h-48 relative overflow-hidden">
                                                <img src={p.image} className="w-full h-full object-cover grayscale-[0.4] group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000 opacity-80" alt={p.series} />
                                                <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
                                                <div className="absolute top-5 left-5 flex flex-col gap-1">
                                                    <span className={`px-2 py-1 bg-black/60 backdrop-blur-md rounded text-[7px] font-title uppercase tracking-widest border ${p.segment === 'premium' ? 'text-yellow-500 border-yellow-600/40' : 'text-gray-400 border-white/10'}`}>{p.segment}</span>
                                                    <span className={`px-2 py-1 bg-black/60 backdrop-blur-md rounded text-[7px] font-title uppercase tracking-widest border ${p.type === 'inverter' ? 'text-blue-400 border-blue-900/30' : 'text-gray-500 border-white/5'}`}>{p.type}</span>
                                                </div>
                                            </div>
                                            <div className="p-7 flex flex-col justify-between h-[160px]">
                                                <div>
                                                    <p className="text-[10px] text-yellow-600 font-title uppercase mb-1 tracking-widest">{p.brand} — завод {p.factory}</p>
                                                    <h3 className="text-base font-title uppercase italic truncate text-white/90 leading-tight">{p.series}</h3>
                                                    <p className="text-[9px] text-gray-600 font-numbers uppercase mt-1 tracking-tighter opacity-60">{p.model || 'SERIES'}</p>
                                                </div>
                                                <div className="flex justify-between items-end border-t border-white/5 pt-5">
                                                    <div>
                                                        <span className="text-[8px] text-gray-500 font-title uppercase tracking-tighter">Цена</span>
                                                        <p className="text-yellow-500 font-numbers text-xl leading-none tracking-tight">
                                                            {calcResult ? `${currentPrice.toLocaleString()} р.` : `от ${minPrice.toLocaleString()} р.`}
                                                        </p>
                                                    </div>
                                                    <div className="bg-yellow-600/10 p-2 rounded-xl text-yellow-600 group-hover:bg-yellow-600 group-hover:text-black transition-colors">
                                                        <IconCheck />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>
                    )}

                    {selectedProduct && (
                        <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/98 backdrop-blur-2xl p-0 sm:p-4 fade-in">
                            <div className="bg-[#111] w-full max-w-2xl rounded-t-[4rem] sm:rounded-[4rem] overflow-hidden border-t sm:border border-yellow-600/20 max-h-[96vh] overflow-y-auto shadow-2xl">
                                <div className="relative h-72 sm:h-80">
                                    <img src={selectedProduct.image} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-[#111]"></div>
                                    <button onClick={() => setSelectedProduct(null)} className="absolute top-8 right-8 w-14 h-14 bg-black/60 backdrop-blur-xl rounded-full flex items-center justify-center text-white border border-white/10 hover:bg-black transition-all active:scale-75 shadow-2xl transition-all"><IconX /></button>
                                    <div className="absolute bottom-6 left-10">
                                        <span className="text-yellow-600 text-xs font-title uppercase tracking-[0.3em] mb-1 block">{selectedProduct.brand} — завод {selectedProduct.factory}</span>
                                        <h3 className="text-3xl sm:text-4xl font-title uppercase italic tracking-tighter leading-none">{selectedProduct.series}</h3>
                                    </div>
                                </div>
                                
                                <div className="p-10 sm:p-14 relative font-main">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-12 gap-6">
                                        <div className="bg-yellow-600 text-black px-6 py-4 rounded-3xl font-title shadow-2xl shadow-yellow-900/20">
                                            <p className="text-[10px] uppercase opacity-60 leading-none mb-1">Для помещения:</p>
                                            <p className="text-2xl uppercase leading-none font-numbers tracking-tight">До {btuToArea[selectedBtu?.btu]} м²</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-5xl font-numbers text-yellow-500 leading-none tracking-tighter">{selectedBtu?.price.toLocaleString()} р.</p>
                                        </div>
                                    </div>
                                    
                                    <div className="mb-12">
                                        <h4 className="text-[10px] font-title text-gray-500 uppercase tracking-[0.4em] mb-5 ml-2 italic">Выберите мощность:</h4>
                                        <div className="grid grid-cols-3 sm:grid-cols-6 gap-3">
                                            {selectedProduct.btuData.map(item => (
                                                <button key={item.btu} onClick={() => setSelectedBtu(item)} className={`py-6 rounded-3xl flex flex-col items-center justify-center transition-all border-2 ${selectedBtu?.btu === item.btu ? 'bg-yellow-600 border-yellow-500 shadow-2xl' : 'bg-black border-white/5 text-gray-600 hover:border-yellow-600/30'}`}>
                                                    <span className={`text-xl font-numbers ${selectedBtu?.btu === item.btu ? 'text-black' : 'text-white'}`}>{item.btu}</span>
                                                    <span className="text-[7px] font-title uppercase opacity-50 tracking-tighter">btu</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mb-12">
                                        <h4 className="text-[10px] font-title text-gray-500 uppercase tracking-[0.4em] mb-4 ml-2 italic">Описание:</h4>
                                        <p className="text-gray-400 text-sm leading-relaxed font-description border-l-2 border-yellow-600/40 pl-6">{selectedProduct.description}</p>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-14 font-title">
                                        <div className="bg-[#1a1a1a] p-6 rounded-3xl border border-white/5 flex flex-col items-center text-center">
                                            <div className="text-yellow-600 mb-3"><IconClock /></div>
                                            <p className="text-[9px] uppercase text-gray-500 mb-1">Монтаж</p>
                                            <p className="text-[11px] text-white tracking-tight">за 24 часа</p>
                                        </div>
                                        <div className="bg-[#1a1a1a] p-6 rounded-3xl border border-white/5 flex flex-col items-center text-center">
                                            <div className="text-yellow-600 mb-3"><IconShield /></div>
                                            <p className="text-[9px] uppercase text-gray-500 mb-1">Гарантия</p>
                                            <p className="text-[11px] text-white tracking-tight">5 лет</p>
                                        </div>
                                        <div className="bg-[#1a1a1a] p-6 rounded-3xl border border-white/5 flex flex-col items-center text-center">
                                            <div className="text-yellow-600 mb-3"><IconTruck /></div>
                                            <p className="text-[9px] uppercase text-gray-500 mb-1">Доставка</p>
                                            <p className="text-[11px] text-yellow-500 italic tracking-tight">Бесплатно</p>
                                        </div>
                                    </div>

                                    <a href={`https://wa.me/89996368698?text=Заказ: ${selectedProduct.brand} - завод ${selectedProduct.factory}. Мощность ${selectedBtu?.btu} BTU. Цена: ${selectedBtu?.price}р.`} className="w-full gold-bg text-black font-title py-9 rounded-[3rem] flex items-center justify-center gap-5 uppercase tracking-[0.5em] text-sm shadow-2xl hover:brightness-110 active:scale-95 transition-all shadow-yellow-900/40">
                                        <IconZap /> Оформить заявку
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-lg flex gap-4 z-40">
                        <a href="tel:89996368698" className="flex-[3] bg-[#1a1a1a]/95 backdrop-blur-2xl border-2 border-yellow-600/30 text-yellow-500 py-6 rounded-[2.5rem] flex items-center justify-center gap-4 font-title text-[11px] uppercase tracking-widest shadow-2xl hover:border-yellow-600 transition-all">Связаться</a>
                        <div className="flex-1 gold-bg text-black py-6 rounded-[2.5rem] font-title text-[11px] uppercase flex items-center justify-center shadow-2xl animate-pulse cursor-default tracking-tighter">Рассрочка</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
